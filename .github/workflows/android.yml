name: Android CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Setup Firebase google-services.json
      env:
        GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
      run: |
        if [ -n "$GOOGLE_SERVICES_JSON" ]; then
          echo "Creating app/google-services.json from secret"
          printf "%s\n" "$GOOGLE_SERVICES_JSON" > app/google-services.json
        else
          echo "GOOGLE_SERVICES_JSON secret not found, falling back to placeholder."
        fi
      
    - name: Build with Gradle
      env:
        POTOKEN_GOOGLE_API_KEY: ${{ secrets.POTOKEN_GOOGLE_API_KEY }}
      run: ./gradlew assembleGithubRelease testGithubReleaseUnitTest
