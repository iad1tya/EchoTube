name: Release App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Setup Firebase google-services.json
      env:
        GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
      run: |
        if [ -n "$GOOGLE_SERVICES_JSON" ]; then
          echo "Creating app/google-services.json from secret"
          printf "%s\n" "$GOOGLE_SERVICES_JSON" > app/google-services.json
        else
          echo "GOOGLE_SERVICES_JSON secret not found, falling back to placeholder."
        fi

    - name: Decode Keystore
      env:
        RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
      run: |
        if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
          echo "Decoding release.keystore from secret"
          echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > release.keystore
        else
          echo "RELEASE_KEYSTORE_BASE64 secret not found, building unsigned APK."
        fi

    - name: Build Release APKs
      env:
        POTOKEN_GOOGLE_API_KEY: ${{ secrets.POTOKEN_GOOGLE_API_KEY }}
        STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew assembleRelease

    - name: Get Tag Name
      id: tag
      run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: Release ${{ steps.tag.outputs.tag }}
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          app/build/outputs/apk/*/release/*.apk
